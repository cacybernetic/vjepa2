# V-JEPA 2.1 training configuration for a CPU machine.
# CPU training is slow, so this uses a tiny model and small clips. It is good
# for testing the pipeline end to end. Change the paths to your own dataset.

run_name: vjepa2_1_cpu
seed: 42
device: cpu          # cpu | cuda | rocm | auto
amp: false           # mixed precision is only used on cuda

dataset:
  use_hdf5: false            # read videos from a folder or zip on the fly
  validate: true             # scan and drop broken files before training
  train_path: data/train.zip # folder or zip with the training videos
  test_path: data/test.zip   # folder or zip with the test videos
  train_h5: data/train.h5    # used only when use_hdf5 is true
  test_h5: data/test.h5
  max_train_samples: null    # null = use all; or an integer cap
  max_test_samples: null
  val_prob: 0.5              # fraction of the test set used for validation
  num_frames: 16             # frames per clip
  frames_per_second: 4.0     # sampling rate; the stride comes from the source fps
  crop_size: 128             # square crop side in pixels
  clip_sampling: chunk       # chunk = tile whole video into overlapping clips;
                             # single = one centered clip per video
  clip_stride: 8             # frames the clip window hops (overlap = num_frames - stride)
  max_clips_per_video: 0     # 0 = unlimited; cap clips taken from one long video
  transform:
    normalize: true
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
    random_resized_crop: true
    scale: [0.3, 1.0]
    aspect_ratio: [0.75, 1.35]
  augment:
    enabled: true
    horizontal_flip_prob: 0.5
    color_jitter: 0.4
    grayscale_prob: 0.2
    gaussian_blur_prob: 0.5

masking:
  spatial_scale: [0.15, 0.7]  # fraction of spatial tokens to predict
  aspect_ratio: [0.75, 1.5]
  num_pred_masks: 1
  min_keep: 4                 # guarantee at least this many context tokens

model:
  name: vit_tiny             # vit_tiny | vit_small | vit_base | vit_large | ...
  patch_size: 16
  tubelet_size: 2
  pred_depth: 12
  pred_embed_dim: 384
  num_mask_tokens: 8
  n_output_distillation: 4   # 4 = deep self-supervision; 1 = single level
  modality_embedding: true
  use_rope: true
  use_sdpa: true

loss:
  loss_exp: 1.0
  context_lambda: 0.5        # base weight of the context loss (0.5 video)
  # 0<v<1 => fraction of total_steps (see the note above `train:`);
  # v>=1 => absolute optimizer steps. Fractions keep the context-loss warmup
  # within reach on short runs (with absolute 1000+, lambda would stay 0 and
  # the whole dense/context objective of V-JEPA 2.1 would never activate).
  lambda_warmup_start: 0.1   # start ramping lambda at 10% of total_steps
  lambda_warmup_end: 0.4     # reach full lambda at 40% of total_steps
  offset_context_loss: false

optim:
  name: adamw
  lr: 1.0e-4
  weight_decay: 0.04
  betas: [0.9, 0.95]
  ema: 0.99925

scheduler:
  name: warmup_hold          # warmup_hold | warmup_cosine
  # 0<v<1 => fraction of total_steps (see the note above `train:`);
  # v>=1 => absolute steps. A fraction lets the LR warmup actually complete
  # regardless of dataset size / epoch count.
  warmup_steps: 0.1          # warm up over the first 10% of total_steps
  start_lr: 1.0e-6
  ref_lr: 3.0e-4
  final_lr: 1.0e-5

# ---------------------------------------------------------------------------
# Run length. There is NO `total_steps` key in this file: it is DERIVED at
# startup from the three values below plus the number of training samples:
#   steps_per_epoch = ceil(ceil(num_train / batch_size) / grad_accum)
#   total_steps     = steps_per_epoch * epochs
# The fractional `scheduler.warmup_steps` and `loss.lambda_warmup_*` above are
# resolved against this total_steps (see resolve_steps in config.py), so they
# scale automatically with the dataset size and epoch count. total_steps is
# printed in the run summary as "total optimizer steps".
# Example: num_train=250, batch_size=2, grad_accum=8, epochs=10
#   -> ceil(250/2)=125, ceil(125/8)=16, 16*10 = 160 optimizer steps.
# ---------------------------------------------------------------------------
train:
  epochs: 10
  batch_size: 2
  grad_accum: 8              # effective batch size = batch_size * grad_accum
  grad_clip_norm: 1.0
  num_workers: 2
  # 0<v<1 => fraction of one epoch; v>=1 => absolute steps. Both are clamped to
  # at most one per epoch, so a periodic log/checkpoint always fires.
  log_every: 0.25           # log ~4 times per epoch (INFO, shown on terminal)
  ckpt_step: 0.5            # checkpoint ~2 times per epoch (in-epoch fault tolerance)
  max_checkpoint: 5         # keep at most this many checkpoint files
  runs_dir: runs
  resume: true              # reuse the latest run folder and continue
  init_weights: null        # path to a .pt to warm-start (used only if no ckpt)
  best_metric: loss         # which validation metric picks the best model
  best_mode: min            # min for losses, max for scores

# V-JEPA 2.1 HDF5 build configuration for a GPU machine.
# The build itself runs on the CPU (decode + transform), but the resulting
# files feed GPU training. HDF5 clips are large, so watch your disk space.

run_name: vjepa2_1_gpu
seed: 42
device: cuda

dataset:
  use_hdf5: false
  validate: true
  train_path: data/train.zip
  test_path: data/test.zip
  train_h5: data/train.h5
  test_h5: data/test.h5
  max_train_samples: null
  max_test_samples: null
  num_frames: 16
  frames_per_second: 4.0
  crop_size: 256
  transform:
    normalize: true
    random_resized_crop: true
  augment:
    enabled: true
    horizontal_flip_prob: 0.5
    color_jitter: 0.4

hdf5:
  augment_copies: 0

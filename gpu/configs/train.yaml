# V-JEPA 2.1 training configuration for a GPU machine.
# Set device to "cuda" for an NVIDIA GPU, or "rocm" for an AMD GPU. Both use the
# same cuda runtime string inside PyTorch. This config follows the paper recipe
# more closely (larger model, higher resolution, mixed precision).

run_name: vjepa2_1_gpu
seed: 42
device: cuda         # cuda (NVIDIA) | rocm (AMD) | auto
amp: true            # mixed precision speeds up training on a GPU

dataset:
  use_hdf5: false
  validate: true
  train_path: data/train.zip
  test_path: data/test.zip
  train_h5: data/train.h5
  test_h5: data/test.h5
  max_train_samples: null
  max_test_samples: null
  val_prob: 0.5
  num_frames: 16
  frames_per_second: 4.0
  crop_size: 256
  transform:
    normalize: true
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
    random_resized_crop: true
    scale: [0.3, 1.0]
    aspect_ratio: [0.75, 1.35]
  augment:
    enabled: true
    horizontal_flip_prob: 0.5
    color_jitter: 0.4
    grayscale_prob: 0.2
    gaussian_blur_prob: 0.5

masking:
  spatial_scale: [0.15, 0.7]
  aspect_ratio: [0.75, 1.5]
  num_pred_masks: 1
  min_keep: 4                 # guarantee at least this many context tokens

model:
  name: vit_large            # scale up to vit_giant / vit_gigantic on big GPUs
  patch_size: 16
  tubelet_size: 2
  pred_depth: 24             # the paper uses a 24-block predictor
  pred_embed_dim: 384
  num_mask_tokens: 8
  n_output_distillation: 4   # deep self-supervision
  modality_embedding: true
  use_rope: true
  use_sdpa: true

loss:
  loss_exp: 1.0
  context_lambda: 0.5        # 0.5 for video, 0.7 for image
  # 0<v<1 => fraction of total_steps (see the note above `train:`);
  # v>=1 => absolute optimizer steps. Fractions keep the context-loss warmup
  # within reach on short runs (with absolute 1000+, lambda would stay 0 and
  # the whole dense/context objective of V-JEPA 2.1 would never activate).
  lambda_warmup_start: 0.1   # start ramping lambda at 10% of total_steps
  lambda_warmup_end: 0.4     # reach full lambda at 40% of total_steps
  offset_context_loss: false

optim:
  name: adamw
  lr: 1.0e-4
  weight_decay: 0.04
  betas: [0.9, 0.95]
  ema: 0.99925

scheduler:
  name: warmup_hold
  # 0<v<1 => fraction of total_steps (see the note above `train:`);
  # v>=1 => absolute steps. A fraction lets the LR warmup actually
  # complete regardless of dataset size / epoch count.
  warmup_steps: 0.1          # warm up over the first 10% of total_steps
  start_lr: 1.0e-6
  ref_lr: 5.25e-4
  final_lr: 1.0e-5

# ---------------------------------------------------------------------------
# Run length. There is NO `total_steps` key in this file: it is DERIVED at
# startup from the three values below plus the number of training samples:
#   steps_per_epoch = ceil(ceil(num_train / batch_size) / grad_accum)
#   total_steps     = steps_per_epoch * epochs
# The fractional `scheduler.warmup_steps` and `loss.lambda_warmup_*` above are
# resolved against this total_steps (see resolve_steps in config.py), so they
# scale automatically with the dataset size and epoch count. total_steps is
# printed in the run summary as "total optimizer steps".
# Example: num_train=200000, batch_size=16, grad_accum=8, epochs=100
#   -> ceil(200000/16)=12500, ceil(12500/8)=1563, 1563*100 = 156300 steps.
# ---------------------------------------------------------------------------
train:
  epochs: 100
  batch_size: 16
  grad_accum: 8
  grad_clip_norm: 1.0
  num_workers: 8
  log_every: 20
  ckpt_step: 1000
  max_checkpoint: 5
  runs_dir: runs
  resume: true
  init_weights: null
  best_metric: loss
  best_mode: min
